# Lower heap avoids native OOM on Windows during R8/D8 (see hs_err: Chunk::new / malloc failed).
org.gradle.jvmargs=-Xmx1536m -XX:MaxMetaspaceSize=512m -XX:ReservedCodeCacheSize=128m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8
org.gradle.workers.max=2
org.gradle.parallel=true
kotlin.daemon.jvmargs=-Xmx512m -XX:MaxMetaspaceSize=256m
android.useAndroidX=true
android.enableJetifier=true
android.defaults.buildfeatures.buildconfig=true
android.nonTransitiveRClass=false
android.nonFinalResIds=false
